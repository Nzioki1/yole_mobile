name: yole_mobile
description: Phase 0 scaffold for the Yole Pesa mobile app.
publish_to: "none"
version: 0.0.1+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.5.0
  flutter_riverpod: ^2.5.1
  intl: ^0.18.1
  logger: ^2.4.0
  connectivity_plus: ^5.0.2
  shared_preferences: ^2.2.2
  flutter_dotenv: ^5.1.0
  package_info_plus: ^5.0.1
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  freezed: ^2.4.7
  freezed_annotation: ^2.4.4
  json_serializable: ^6.7.1
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/images/